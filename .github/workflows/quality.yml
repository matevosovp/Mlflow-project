name: Quality checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python syntax
        run: python -m compileall -q mlflow_server

      - name: Check startup script
        run: bash -n mlflow_server/start_mlflow.sh

      - name: Validate notebook JSON
        run: python -m json.tool model_improvement/model_improvement.ipynb > /dev/null
